<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract Apolaki sun motif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1115"/>
      <stop offset="100%" stop-color="#12141A"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE6B0"/>
      <stop offset="40%" stop-color="#FFD27A"/>
      <stop offset="72%" stop-color="#F5A524"/>
      <stop offset="100%" stop-color="#C9461A" stop-opacity="0.18"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A524" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#F5A524" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F5A524" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFD27A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#sky)"/>
  <circle cx="360" cy="150" r="260" fill="url(#halo)"/>
  <g>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(0.0 360 150)" stroke="url(#ray)" stroke-width="2.4" opacity="0.3"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(20.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(40.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(60.0 360 150)" stroke="url(#ray)" stroke-width="2.4" opacity="0.3"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(80.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(100.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(120.0 360 150)" stroke="url(#ray)" stroke-width="2.4" opacity="0.3"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(140.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(160.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(180.0 360 150)" stroke="url(#ray)" stroke-width="2.4" opacity="0.3"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(200.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(220.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(240.0 360 150)" stroke="url(#ray)" stroke-width="2.4" opacity="0.3"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(260.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(280.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(300.0 360 150)" stroke="url(#ray)" stroke-width="2.4" opacity="0.3"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(320.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  <line x1="360" y1="10" x2="360" y2="-97" transform="rotate(340.0 360 150)" stroke="url(#ray)" stroke-width="1.4" opacity="0.13"/>
  </g>
  <circle cx="360" cy="150" r="130" fill="url(#sun)"/>
  <circle cx="360" cy="150" r="130" fill="none" stroke="#FFD27A" stroke-width="1.5" opacity="0.5"/>
  <circle cx="360" cy="150" r="85" fill="none" stroke="#FFE6B0" stroke-width="1" opacity="0.25"/>
  <!-- horizon haze -->
  <rect x="0" y="222" width="1200" height="78" fill="#0B0C10" opacity="0.55"/>
</svg>
